<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phasic Dial Solver</title>
    <link rel="stylesheet" href="./../../common/common.css" />
    <link rel="stylesheet" href="./phasicDialSolver.css" />
    <script type="module" src="./../../common/common.ts"></script>
    <script type="module" src="./phasicDialSolver.ts"></script>
  </head>
  <body>
    <div id="container">
      <div id="dials-config">
        <h2>Dials</h2>
        <div id="dials-list"></div>
        <md-icon-button id="add-dial">
          <md-icon>add</md-icon>
        </md-icon-button>
      </div>

      <table id="turns-table">
        <thead>
          <tr id="table-header"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>

      <md-icon-button id="add-button">
        <md-icon>add</md-icon>
      </md-icon-button>

      <md-filled-button id="calculate">Calculate Turns</md-filled-button>
    </div>
  </body>
</html>
